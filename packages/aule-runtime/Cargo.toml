[package]
name = "aule-runtime"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
anyhow = "1"
aule-spacetimedb-client = { path = "../aule-spacetimedb-client" }
env_logger = "0.11"
log = "0.4"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spacetimedb-sdk = "2.0.2"
tokio = { version = "1", features = ["rt", "macros"] }
